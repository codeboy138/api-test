<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ONERROR — FUTURE WARP 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --y: #FFF200; --r: #FF2D55; --k: #000; --w: #fff; --g: #1a1a1a; }
  body { background: var(--k); color: var(--w); font-family: 'Space Mono', monospace; line-height: 1.4; overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }
  nav { padding: 1.2rem 1.5rem; background: var(--k); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--y); text-decoration: none; letter-spacing: 1px; }
  .logo span { color: var(--r); }
  main { flex: 1; padding: 1.5rem; overflow-y: auto; padding-bottom: 180px; }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem; line-height: 0.9; margin-bottom: 0.5rem; text-transform: uppercase; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 1px; }
  .upload-container { width: 100%; aspect-ratio: 3/4; border: 2px dashed var(--y); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; position: relative; overflow: hidden; background: var(--g); }
  #img-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
  .upload-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .upload-text { font-size: 13px; font-weight: 700; color: var(--y); text-align: center; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-top: 1.5rem; }
  .card { border: 1px solid #333; padding: 1.2rem; text-align: left; transition: 0.2s; background: #0a0a0a; }
  .card.active { border: 2px solid var(--r); background: rgba(255, 45, 85, 0.1); }
  .card-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--w); }
  .card-tag { font-size: 9px; color: var(--r); text-transform: uppercase; font-weight: 700; }
  .action-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 1.5rem; background: linear-gradient(transparent, var(--k) 30%); z-index: 110; }
  .btn { background: var(--y); color: var(--k); border: none; width: 100%; padding: 1.2rem; font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; }
  .btn:disabled { background: #333; color: #666; }
  .loader { display: none; text-align: center; padding: 3rem 0; color: var(--y); font-weight: 700; animation: blink 0.8s infinite; }
  @keyframes blink { 50% { opacity: 0.2; } }
  #result-display { width: 100%; display: none; border: 3px solid var(--y); margin-top: 1rem; }
  .ticker { position: absolute; bottom: 95px; left: 0; width: 100%; background: var(--y); color: var(--k); font-size: 11px; font-weight: 700; padding: 5px 0; overflow: hidden; white-space: nowrap; }
  .ticker div { display: inline-block; animation: tick 20s linear infinite; }
  @keyframes tick { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
</style>
</head>
<body>

<nav><a href="#" class="logo">ON<span>ERROR</span></a><div style="font-size: 9px; color: #666;">FIX_413_RESOLVED_v3.1</div></nav>

<main>
  <div id="step-1" class="step">
    <h1 class="title">WARP YOUR<br>PRESENCE</h1>
    <p class="subtitle">— 2026 크리스마스 시뮬레이션</p>
    <div class="upload-container" onclick="document.getElementById('input-file').click()">
      <div id="placeholder-ui">
        <div class="upload-icon" style="text-align:center;">📸</div>
        <div class="upload-text">사진 촬영 (자동 압축 적용)<br><span style="font-weight:400; font-size:10px; opacity:0.6;">(413 Error 해결 로직 포함)</span></div>
      </div>
      <img id="img-preview">
    </div>
    <input type="file" id="input-file" accept="image/*" capture="camera" hidden onchange="handleFile(this)">
  </div>

  <div id="step-2" class="step" style="display:none;">
    <h1 class="title">SELECT SCENE</h1>
    <div class="grid">
      <div class="card active" onclick="sel(this, 'cafe')"><div class="card-tag">EXP_01</div><div class="card-name">X-MAS CAFE</div></div>
      <div class="card" onclick="sel(this, 'plaza')"><div class="card-tag">EXP_02</div><div class="card-name">NYC PLAZA</div></div>
      <div class="card" onclick="sel(this, 'igloo')"><div class="card-tag">EXP_03</div><div class="card-name">AURORA IGLOO</div></div>
      <div class="card" onclick="sel(this, 'mars')"><div class="card-tag">EXP_04</div><div class="card-name">MARS X-MAS</div></div>
    </div>
  </div>

  <div id="step-3" class="step" style="display:none;">
    <h1 class="title">WARP COMPLETE</h1>
    <div class="loader" id="loader-txt">RECONSTRUCTING DATA...</div>
    <img id="result-display">
    <p id="share-hint" style="display:none; font-size:11px; color:var(--y); margin-top:1.5rem; text-align:center;">이미지를 길게 눌러 저장하세요</p>
  </div>
</main>

<div class="action-bar">
  <button id="cta-btn" class="btn" onclick="handleNext()" disabled>사진을 촬영하세요</button>
</div>

<script>
  // 시니어님, 본인의 키를 아래에 넣으세요
  const FAL_KEY = "03a36b7d-177d-4602-b8ad-699fbd88cb98:4c8a41059c2b9d1a155c5580f4dc50a3"; 
  
  let currentStep = 1;
  let userImgBase64 = null;
  let selectedTarget = 'cafe';

  // [중요] 413 에러 해결을 위한 클라이언트 압축 로직
  function handleFile(input) {
    const file = input.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          const max_size = 1024; // 최대 해상도 제한

          if (width > height) {
            if (width > max_size) { height *= max_size / width; width = max_size; }
          } else {
            if (height > max_size) { width *= max_size / height; height = max_size; }
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          // 퀄리티를 0.7로 낮춰서 용량을 수백 KB 수준으로 줄임
          userImgBase64 = canvas.toDataURL('image/jpeg', 0.7);
          
          document.getElementById('img-preview').src = userImgBase64;
          document.getElementById('img-preview').style.display = 'block';
          document.getElementById('placeholder-ui').style.display = 'none';
          document.getElementById('cta-btn').disabled = false;
          document.getElementById('cta-btn').innerText = "장소 선택하기 →";
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
  }

  function sel(el, val) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    selectedTarget = val;
  }

  function handleNext() {
    if (currentStep === 1) {
      document.getElementById('step-1').style.display = 'none';
      document.getElementById('step-2').style.display = 'block';
      document.getElementById('cta-btn').innerText = "워프 시작 ★";
      currentStep = 2;
    } else if (currentStep === 2) {
      triggerWarp();
    } else {
      location.reload();
    }
  }

  async function triggerWarp() {
    if(!FAL_KEY || FAL_KEY.includes("YOUR")) return alert("FAL_KEY를 확인하세요.");
    
    document.getElementById('step-2').style.display = 'none';
    document.getElementById('step-3').style.display = 'block';
    document.getElementById('loader-txt').style.display = 'block';
    const btn = document.getElementById('cta-btn');
    btn.disabled = true; btn.innerText = "데이터 전송 중...";

    try {
      const response = await fetch("https://api.fal.ai/v1/rw/fal-ai/instantid", {
        method: "POST",
        headers: { "Authorization": `Key ${FAL_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          "image_url": userImgBase64,
          "prompt": "high quality photo of the person in Christmas theme",
          "ip_adapter_scale": 0.8,
          "guidance_scale": 7.5
        })
      });

      const data = await response.json();
      const finalUrl = data?.images?.[0]?.url || data?.data?.images?.[0]?.url;
      
      if(finalUrl) {
        document.getElementById('result-display').src = finalUrl;
        document.getElementById('result-display').style.display = 'block';
        document.getElementById('share-hint').style.display = 'block';
        btn.disabled = false; btn.innerText = "다시 워프하기 ↺";
        currentStep = 3;
      } else {
        throw new Error(data.detail || "생성 실패");
      }
    } catch (e) {
      alert("Error: " + e.message);
      location.reload();
    } finally {
      document.getElementById('loader-txt').style.display = 'none';
    }
  }
</script>
</body>
</html>
